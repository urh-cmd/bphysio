# BPyhsio – für Portainer auf Raspberry Pi (einzelne Datei)
# In Portainer: Stacks → Add stack → Git repository ODER Web editor mit Pfad
# API läuft über gleiche Domain (NEXT_PUBLIC_API_URL leer)

services:
  db:
    image: postgres:16-alpine
    container_name: bpyhsio-db
    environment:
      POSTGRES_USER: bpyhsio
      POSTGRES_PASSWORD: bpyhsio_local
      POSTGRES_DB: bpyhsio
    ports:
      - "5432:5432"
    volumes:
      - bpyhsio_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpyhsio"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: bpyhsio_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bpyhsio-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://bpyhsio:bpyhsio_local@db:5432/bpyhsio
      UPLOAD_DIR: /app/data/uploads
      PROCESSED_DIR: /app/data/processed
      # DEBUG: "true" setzen um bei 500 den genauen Fehler zu sehen
    volumes:
      - bpyhsio_uploads:/app/data/uploads
      - bpyhsio_processed:/app/data/processed
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    image: bpyhsio_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: bpyhsio-frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_BACKEND_URL: http://backend:8001
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  bpyhsio_data:
  bpyhsio_uploads:
  bpyhsio_processed:
