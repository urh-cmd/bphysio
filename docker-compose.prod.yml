# BPyhsio – Production / Online-Freigabe
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# .env erstellen mit: POSTGRES_PASSWORD=IhrSicheresPasswort

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bpyhsio_prod}

  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://bpyhsio:${POSTGRES_PASSWORD:-bpyhsio_prod}@db:5432/bpyhsio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leer = API über gleiche Domain (Next.js Proxy)
        NEXT_PUBLIC_API_URL: ""
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_BACKEND_URL: http://backend:8001
